# ============================================================
# CI 统一配置（标准库 configparser 读取，零依赖）。CI 框架：Jenkins（D-016）。
# 部署：代码+离线包拷到服务器 → sudo python3 server/deploy/deploy.py all。
# 注意：注释只能独占一行，不能写在“值”的同一行（会被当成值的一部分）。
# ============================================================

[jenkins]
# Jenkins HTTP 端口。仅限 80-90 / 443 / 8080-8090（内网防火墙），deploy.py check 校验。
http_port = 8080
# JENKINS_HOME（任务/插件/JCasC 落地）。相对路径以部署目录为基。
home = /opt/ci/jenkins_home
# 预配的评测 job 名（JCasC 据此建 pipeline job，webhook 适配器据此触发）。
job_name = qsort-eval
# Jenkins 管理员用户名（JCasC 建此用户；适配器用它+密码调 API）。
# 密码在 config.local.ini [secrets] jenkins_admin_password（不入仓，C-1）。
admin_user = admin
# 启动用 JDK：留空 = 用离线包内置 jdk/；填绝对路径 = 用服务器已装的 JDK21+（Jenkins 2.555.x 要求）。
java_home =

[offline]
# 离线包目录（有网机 fetch_offline.sh 产出，bootstrap 推到此处）。
deps_dir = /opt/ci/offline
# 离线包文件名（含 jenkins.war + plugins/ + jdk/，由 fetch_offline.sh 打包）。
package = jenkins-offline.tar.gz

[webhook]
# webhook 适配器监听端口。同样仅限 80-90 / 443 / 8080-8090，deploy.py check 校验。
# 须与 [jenkins] http_port 不同（同机两个服务）。POST 触发需 X-Devcloud-Token。
listen = 0.0.0.0:8090
# 认证头（X-Devcloud-Token）与 payload 字段在 constants.py 集中（平台固定，集中管理）。
# 共享密钥 WEBHOOK_SECRET 放 env 或 config.local.ini [secrets]。
# 传给 Jenkins 的 GIT_URL 用 ssh 还是 http（决定取 payload 的 git_ssh_url / git_http_url）。
git_auth = ssh

[limits]
# 不可信代码（评测 qsort）的超时+资源限制（NFR-3/C-2）。Jenkins eval stage 经 limited_run 套用。
mem_mb = 2048
cpu_sec = 60
wall_sec = 120
nofile = 256

[remote]
# 客户端首次远端 bootstrap（local/admin/deploy_remote.py 经 SSH/SCP 推码+离线包 → 远程跑 deploy.py）。
# host 留空 = 不启用远端，直接在服务器本地跑 deploy.py。私钥留 ~/.ssh，勿入仓（C-1, D-009）。
# 非 root 用户部署时自动 sudo 运行（connectivity 校验 sudo/wheel/admin 组）。
host =
user = root
port = 22
# 远端部署目录（tools/ci 代码落地处）。
dest = /opt/ci
# 额外 ssh 选项，如 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new
ssh_opts =
