# ====================================================================
# CI 统一配置（configparser 读取，零依赖）。CI 框架=Jenkins（.deb 离线安装）。
# 配置按【在哪台机器用】分两侧：
#   ▸ 客户端（有网机下插件/离线件，手动打包拷到服务器）：[proxy]
#     （要手动下的 jenkins/java .deb 版本/URL 见 docs/quick_deploy.md「离线件清单」，不在本文件）
#   ▸ 服务端（内网 CI 服务器，装 Jenkins）：[jenkins] [offline] [limits]
# 敏感项（Jenkins admin 密码 / 代理明文密码）放 config.local.ini，不入仓（C-1）。
# 注意：注释只能独占一行，不能写在“值”的同一行（会被当成值的一部分）。
# ====================================================================


# ========================== 客户端配置 ==============================

[proxy]
# 【客户端·有网机】下载用代理。fetch_plugins.py 读这里注入 curl 环境；全空 = 直连（纯外网留空即可）。
# curl 不读 Windows/macOS 系统代理、也不读 PAC，故须在此显式填。
# 含明文密码的代理放 config.local.ini [proxy]（不入仓 C-1）；此处只留空模板。
# 注意：curl 仅认小写 http_proxy（大写 HTTP_PROXY 出于 CGI 安全被忽略），脚本会按需补齐大小写。
# 例：https_proxy = http://user:pass@proxy.corp:8080      no_proxy = .corp,localhost,127.0.0.1
http_proxy =
https_proxy =
all_proxy =
no_proxy =

# ========================== 服务端配置 ==============================

[jenkins]
# 【服务端】Jenkins HTTP 端口。仅限 80-90 / 443 / 8080-8090（内网防火墙），deploy.py check 校验。
http_port = 8080
# Multibranch/组织文件夹的顶层名（JCasC 据此建：分支源插件扫内源 git → 发现带 Jenkinsfile 的仓/分支自动建子 job）。
job_name = benchmark-ci
# numExecutors = 总并行构建数。不同仿真器可并行故 >1；单仿真器的并发由 jenkins.yaml 的 throttle 类别
# 按其 license 数限（D-003）。按真实总并行能力设，别虚高（C-3）。
executors = 4
# Jenkins 管理员用户名（JCasC 建此用户；适配器用它+密码调 API）。
# 密码在 config.local.ini [secrets] jenkins_admin_password（不入仓，C-1）。
admin_user = admin
# 说明：.deb 安装后 JENKINS_HOME=/var/lib/jenkins、以 jenkins 用户运行（deb 自带 jenkins.service）。
# 插件全离线（内网 Update Center 装不了）：fetch_plugins.py 据 plugins.txt 公网下，deploy 拷进默认插件路径。

[offline]
# 【服务端】离线件（jenkins/java 的 .deb + plugins/*.jpi）在服务器上的落地目录。
# 把有网机产出的 .deb 与 jenkins-plugins.tar.gz 解包后的 plugins/ 手动拷到此目录，再跑 deploy.py。
deps_dir = /opt/ci/local/offline

[limits]
# 【服务端】不可信评测代码的超时+资源限制（NFR-3）。Jenkins eval stage 经 limited_run 套用。
mem_mb = 2048
cpu_sec = 60
wall_sec = 120
nofile = 256
