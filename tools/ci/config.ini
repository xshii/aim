# ====================================================================
# CI 统一配置（configparser 读取，零依赖）。CI 框架=Jenkins（.deb 离线安装）。
# 配置按【在哪台机器用】分两侧：
#   ▸ 客户端（有网机下离线包 + 执行机 SSH 推送）：[fetch] [remote]
#   ▸ 服务端（内网 CI 服务器，装 Jenkins + webhook 适配器）：[jenkins] [offline] [webhook] [limits]
# 敏感项（webhook 密钥 / Jenkins admin 密码）放 config.local.ini，不入仓（C-1）。
# 注意：注释只能独占一行，不能写在“值”的同一行（会被当成值的一部分）。
# ====================================================================


# ========================== 客户端配置 ==============================

[fetch]
# 【客户端·有网机】local/admin/fetch_offline.py 据此下载离线件（产出到 tools/ci/local/offline/）。
# 版本号下包前到官网核对，改这里（装错版本是硬故障，勿臆造）。
# Jenkins 2.555.x 要求 Java 21+（已不支持 Java 17）。
jenkins_version = 2.555.1
# Jenkins LTS Debian 包（.deb）：文件名 + 下载 URL（官方 debian-stable 仓库）。
jenkins_deb = jenkins_2.555.1_all.deb
jenkins_deb_url = https://pkg.jenkins.io/debian-stable/binary/jenkins_2.555.1_all.deb
# Java 21（直接装 JDK/JRE 的 .deb，apt 与 Jenkins 一起装）。
# 来源因发行版/内网镜像而异：URL 留空时 fetch 跳过，请手动把该 .deb 放进 local/offline/。
java_deb = openjdk-21-jre-headless.deb
java_deb_url =
# 插件：内网 Update Center 装不了，故全部离线——有网机跑 local/admin/fetch_plugins.py 据 plugins.txt
# 从公网下插件+依赖到 local/offline/plugins/，deploy 拷进 Jenkins。插件版本/清单见 plugins.txt（非此处）。

[remote]
# 【客户端·执行机】首次远端 bootstrap：SSH/SCP 推码+离线包 → 远程跑 deploy.py。
# host 留空 = 不用远端，直接在服务器本地跑 deploy.py。私钥留 ~/.ssh，勿入仓（C-1, D-009）。
# 非 root 用户部署时自动 sudo（connectivity 校验 sudo/wheel/admin 组）。
host =
user = root
port = 22
# 远端部署目录（tools/ci 代码落地处）。
dest = /opt/ci
# 额外 ssh 选项，如 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new
ssh_opts =


# ========================== 服务端配置 ==============================

[jenkins]
# 【服务端】Jenkins HTTP 端口。仅限 80-90 / 443 / 8080-8090（内网防火墙），deploy.py check 校验。
http_port = 8080
# 预配的评测 job 名（JCasC 据此建 pipeline job，webhook 适配器据此触发）。
job_name = qsort-eval
# numExecutors = 总并行构建数。不同仿真器可并行故 >1；单仿真器的并发由 jenkins.yaml 的 throttle 类别
# 按其 license 数限（D-003）。按真实总并行能力设，别虚高（C-3）。
executors = 4
# Jenkins 管理员用户名（JCasC 建此用户；适配器用它+密码调 API）。
# 密码在 config.local.ini [secrets] jenkins_admin_password（不入仓，C-1）。
admin_user = admin
# 说明：.deb 安装后 JENKINS_HOME=/var/lib/jenkins、以 jenkins 用户运行（deb 自带 jenkins.service）。
# 插件全离线（内网 Update Center 装不了）：fetch_plugins.py 据 plugins.txt 公网下，deploy 拷进默认插件路径。

[offline]
# 【服务端】离线件（jenkins/java 的 .deb + plugins/*.jpi）在服务器上的落地目录。
# 客户端 local/offline/ 随代码推到 <dest>/local/offline，故默认与之对应。
deps_dir = /opt/ci/local/offline

[webhook]
# 【服务端】webhook 适配器监听端口。仅限 80-90 / 443 / 8080-8090，且须与 jenkins http_port 不同。
listen = 0.0.0.0:8090
# 认证头（X-Devcloud-Token）与 payload 字段在 constants.py 集中。共享密钥 WEBHOOK_SECRET 放 config.local.ini。
# 传给 Jenkins 的 GIT_URL 用 ssh 还是 http（决定取 payload 的 git_ssh_url / git_http_url）。
git_auth = ssh

[limits]
# 【服务端】不可信评测代码的超时+资源限制（NFR-3）。Jenkins eval stage 经 limited_run 套用。
mem_mb = 2048
cpu_sec = 60
wall_sec = 120
nofile = 256
