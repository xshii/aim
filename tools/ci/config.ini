# ============================================================
# CI 系统统一配置（标准库 configparser 读取，零依赖）
# 部署：全量代码拷到服务器后，在服务器上跑 deploy.py。无 ssh/隧道。
# 一般只需关心 [offline]：把 .deb 放好。host/端口可留空由部署自动锁定。
# 注意：注释只能独占一行，不能写在“值”的同一行（会被当成值的一部分）。
# ============================================================

[server]
# 本机访问地址（拼 GitLab external_url 用）。
# 留空 = 部署时（deploy.py host/all）自动探测本机 IP 并写回这里锁定。
# 多机访问或想固定时，手动填内网 IP/域名（勿填 127.0.0.1）。
host =

[gitlab]
# GitLab 监听端口（服务器部分端口被占用，从候选探测一个空闲的锁定）。
candidate_ports = 8929,9080,9443,18080,28080
# 锁定端口：留空=部署时自动探测写回；有值=复用不再探测（避免漂移）。
# 强制换端口：清空，或 probe_port.py --force。
http_port =
# true=http_port空时自动探测锁定；false=必须手动填 http_port。
auto_lock = true
# 对外地址默认由 host+http_port 组装。用域名/HTTPS/反代时手动覆盖：
# external_url = http://10.0.0.10:8929

[offline]
# 离线依赖目录。留空 = 用 当前目录/offline（即 deploy 所在处的 offline/）。
# 想固定到绝对路径时填，如 /opt/ci/offline。
deps_dir =
# 三个 .deb 的文件名（下载清单见 docs/OFFLINE_DEPENDENCIES.md，手动下载）。
gitlab_archive = gitlab-ce_19.0.1-ce.0_amd64.deb
runner_archive = gitlab-runner_amd64.deb
# Runner 依赖包（新版必需，离线须一并提供，逗号分隔）。
runner_deps = gitlab-runner-helper-images.deb
# GitLab 额外依赖（通常自包含，留空）。
gitlab_deps =

[limits]
# 运行型验证的超时+资源限制（防资源耗尽/卡死）。
mem_mb = 2048
cpu_sec = 60
wall_sec = 120
nofile = 256

[runner]
# 仿真串行：并发数。仿真 License=1、不支持并行，必须为 1。
concurrent = 1
runner_tag = sim-license
runner_name = sim-runner

[gate]
# 质量门禁：验证通过率低于此值则阻断。1.0=全过才算成功。
min_pass_ratio = 1.0

[mcp]
# MCP：给开发端查 CI 状态/拉日志（stdio，接 opencode）。触发构建用 webhook，不在此。
# 凭证（GITLAB_API/TOKEN/PROJECT）用环境变量传入，不写本文件。接入见 local/mcp/opencode.json.example。
enabled = true
servers = ci_control

[remote]
# 客户端【首次】远端 bootstrap（local/admin/deploy_remote.py 经 SSH/SCP 推码+依赖→远程跑 deploy.py）。
# host 留空 = 不启用远端，按 server/deploy/deploy.py 本地部署。私钥留 ~/.ssh，勿入仓（C-1, D-009）。
host =
user = root
port = 22
# 远端部署目录（tools/ci 代码与 offline/ 落地处）。
dest = /opt/ci
# 额外 ssh 选项，如 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new
ssh_opts =

[fetch]
# 离线依赖获取：manual=手动放好 deps_dir；auto=执行机经代理下载到本地 deps_dir 再 push。
mode = manual
# auto 模式各包下载 URL（文件名取 [offline] 对应项）。代理见 config.local.ini [proxy]。
gitlab_url =
runner_url =
runner_deps_url =

[webhook]
# 内源托管 webhook 接收器：校验 X-Auth 头共享密钥 → 触发 GitLab 流水线（FR-19，与 GitLab 同机）。
enabled = false
listen = 0.0.0.0:9100
# 内源站在此请求头携带共享密钥（可改名）。
auth_header = X-Auth-Token
# 触发目标 GitLab 项目 ID（host:port 取 [server]/[gitlab]，或 env GITLAB_API 覆盖）。
project_id =
ref = main
# 共享密钥(WEBHOOK_SECRET)与 trigger token(GITLAB_TRIGGER_TOKEN) 不写本文件，
# 放环境变量或 config.local.ini [secrets]（gitignore）。
