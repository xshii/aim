# ============================================================
# CI 调度器统一配置（标准库 configparser 读取，零依赖）。
# 部署：代码拷到服务器 → sudo python3 server/deploy/deploy.py all。
# 注意：注释只能独占一行，不能写在“值”的同一行（会被当成值的一部分）。
# ============================================================

[scheduler]
# 任务库 / 工作区 / 日志目录。相对路径以部署目录为基；留空用默认 var/*。
db_path = var/ci.db
workspace_dir = var/ws
log_dir = var/log
# 并发 = 仿真 License 数。仿真不支持并行，必须为 1（单 worker 串行）。
concurrency = 1
# git checkout 认证方式：ssh | http。密钥/token 放 config.local.ini [scheduler]（不入仓）。
git_auth = ssh
# worker 轮询间隔（秒）。
poll_interval = 2

[limits]
# 运行型验证的超时 + 资源限制（防资源耗尽/卡死）。
mem_mb = 2048
cpu_sec = 60
wall_sec = 120
nofile = 256

[gate]
# 质量门禁：验证通过率低于此值则阻断。1.0=全过才算成功。
min_pass_ratio = 1.0

[webhook]
# webhook 接收器 + 只读 Web UI。POST 入队需 X-Auth-Token；GET 网页/日志内网只读。
# 监听端口仅限 80-90 / 443 / 8080-8090（内网防火墙），deploy.py check 会校验。
listen = 0.0.0.0:8080
# 认证头（X-Devcloud-Token）与 payload 字段在 constants.py 集中（平台固定，集中管理）。
# 共享密钥 WEBHOOK_SECRET 放 env 或 config.local.ini [secrets]。

[mcp]
# 开发端 MCP（stdio，接 opencode）查任务状态/日志。db 路径经 env CI_DB_PATH 或 [scheduler] db_path。
enabled = true

[remote]
# 客户端首次远端 bootstrap（local/admin/deploy_remote.py 经 SSH/SCP 推码 → 远程跑 deploy.py）。
# host 留空 = 不启用远端，直接在服务器本地跑 deploy.py。私钥留 ~/.ssh，勿入仓（C-1, D-009）。
# 非 root 用户部署时自动 sudo 运行（remote_admin 校验 sudo/wheel/admin 组）。
host =
user = root
port = 22
# 远端部署目录（tools/ci 代码落地处）。
dest = /opt/ci
# 额外 ssh 选项，如 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new
ssh_opts =
