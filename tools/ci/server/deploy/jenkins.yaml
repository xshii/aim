# implements: FR-3
# Jenkins Configuration-as-Code（JCasC）模板（D-018：配置即代码，离线可复现）。
# deploy.py 把 @@占位@@ 用 config.ini 的值填好后落到 JENKINS_HOME/jenkins.yaml，
# 经 systemd 环境变量 CASC_JENKINS_CONFIG 加载。改配置 → 改 config.ini → 重跑 deploy.py（C-7）。
#
# 密码不入仓（C-1）：${JENKINS_ADMIN_PASSWORD} 由 Jenkins 启动时从 systemd EnvironmentFile 读取，
# deploy.py 从 config.local.ini [secrets] 写入该 EnvironmentFile（0600），仓库里只有变量名。
jenkins:
  systemMessage: "AI Benchmark CI · Jenkins(offline, JCasC) · 仿真串行 numExecutors=1"
  # 仿真 License=1：单节点仅 1 个执行器 → 全局同一时刻只跑 1 个构建（D-003 串行硬约束）。
  # 多节点扩容时再用 throttle-concurrents/lockable-resources 按类别限并发。
  numExecutors: 1
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "@@ADMIN_USER@@"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://127.0.0.1:@@HTTP_PORT@@/"

# qsort 评测 pipeline job（job-dsl 内联，离线自包含；webhook 适配器 buildWithParameters 触发）。
# 三个参数在 job 创建时即存在 → 适配器首次触发即可带参。
jobs:
  - script: |
      pipelineJob('@@JOB_NAME@@') {
        description('AI Benchmark qsort 功能+性能评测（webhook 触发，参数化）')
        parameters {
          stringParam('GIT_URL', '', '被测仓库 git url')
          stringParam('GIT_SHA', '', '提交 SHA（精确 checkout）')
          stringParam('BRANCH', 'main', '分支（GIT_SHA 为空时用）')
        }
        definition {
          cps {
            sandbox(true)
            script('''
              pipeline {
                agent any
                options { disableConcurrentBuilds(abortPrevious: true) }  // 同 job 新构建取消旧的（auto-cancel）
                stages {
                  stage('checkout') {
                    steps {
                      checkout([$class: 'GitSCM',
                        branches: [[name: "${params.GIT_SHA ?: params.BRANCH}"]],
                        userRemoteConfigs: [[url: params.GIT_URL]]])
                    }
                  }
                  stage('功能+性能评测') {
                    // 经 limited_run 加超时+资源限制跑不可信代码（NFR-3）；eval.py 内含功能+性能两项，退出码即门禁
                    steps { sh 'python3 @@CI_TOOLING@@/server/harness/limited_run.py . python3 eval.py .' }
                  }
                }
                post { always { archiveArtifacts artifacts: 'qsort_eval.json', allowEmptyArchive: true } }
              }
            '''.stripIndent())
          }
        }
      }
