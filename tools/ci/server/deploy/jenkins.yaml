# implements: FR-3
# Jenkins Configuration-as-Code（JCasC）模板（D-018：配置即代码，离线可复现）。
# gen_jenkins_yaml.py 把 @@占位@@ 用 config.ini 的值填好 → server/deploy/jenkins.rendered.yaml；
# 拷到 /var/lib/jenkins/jenkins.yaml 或经 UI「Configuration as Code → Apply」/ CASC_JENKINS_CONFIG 加载。
# 改配置 → 改 config.ini → 重跑 gen_jenkins_yaml.py（C-7）。
#
# 密码不入仓（C-1）：${JENKINS_ADMIN_PASSWORD} 由 Jenkins 启动时从环境读取（systemd EnvironmentFile 或 env），
# 仓库里只有变量名；gen 只校验密码已配置、不写进 yaml。
jenkins:
  systemMessage: "AI Benchmark CI · Jenkins(offline, JCasC) · 仿真按 throttle 类别限并发(D-003)"
  # numExecutors = 总并行构建数（来自 config.ini [jenkins] executors）。不同仿真器可并行故 >1；
  # 单个仿真器的并发由下方 throttle 类别按其 license 数限（同仿真器串行、不同仿真器并行，D-003）。
  numExecutors: @@EXECUTORS@@
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "@@ADMIN_USER@@"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://127.0.0.1:@@HTTP_PORT@@/"
  # 并发限流（throttle-concurrents，D-003）。类别 = 全局共享计数器，Jenkinsfile 只能引用、改不了 max。
  # 用预留通用坑位 c1/c2/c3（max=1/2/3）：各仓 Jenkinsfile 认领唯一名 throttle(['cX-N'])；不同名互不挡、可并行。
  #  ▸ 仿真器：按其 license 数选档——串行/单 license→c1-N、并发 2→c2-N、并发 3→c3-N；
  #    【同一仿真器的所有项目必须用同一个坑位】，才能共享其 license 计数（license>3 则在此另加更高档类别）。
  #  ▸ 单任务只想"自己不并发"：用 options{ disableConcurrentBuilds() } 即可，无需占坑。
  # ⚠ 同名类别共享同一计数器：不相干任务别撞同一个坑位。坑位用完了再来本文件加。
  throttleJobProperty:
    categories:
      # —— c1-N（各自串行 max1；串行仿真器 / 互斥资源认领一个）——
      - { categoryName: "c1-1", maxConcurrentTotal: 1, maxConcurrentPerNode: 1 }
      - { categoryName: "c1-2", maxConcurrentTotal: 1, maxConcurrentPerNode: 1 }
      - { categoryName: "c1-3", maxConcurrentTotal: 1, maxConcurrentPerNode: 1 }
      - { categoryName: "c1-4", maxConcurrentTotal: 1, maxConcurrentPerNode: 1 }
      - { categoryName: "c1-5", maxConcurrentTotal: 1, maxConcurrentPerNode: 1 }
      - { categoryName: "c1-6", maxConcurrentTotal: 1, maxConcurrentPerNode: 1 }
      - { categoryName: "c1-7", maxConcurrentTotal: 1, maxConcurrentPerNode: 1 }
      - { categoryName: "c1-8", maxConcurrentTotal: 1, maxConcurrentPerNode: 1 }
      # —— c2-N（并发 2；并发 2 的仿真器认领一个）——
      - { categoryName: "c2-1", maxConcurrentTotal: 2, maxConcurrentPerNode: 2 }
      - { categoryName: "c2-2", maxConcurrentTotal: 2, maxConcurrentPerNode: 2 }
      - { categoryName: "c2-3", maxConcurrentTotal: 2, maxConcurrentPerNode: 2 }
      - { categoryName: "c2-4", maxConcurrentTotal: 2, maxConcurrentPerNode: 2 }
      - { categoryName: "c2-5", maxConcurrentTotal: 2, maxConcurrentPerNode: 2 }
      - { categoryName: "c2-6", maxConcurrentTotal: 2, maxConcurrentPerNode: 2 }
      - { categoryName: "c2-7", maxConcurrentTotal: 2, maxConcurrentPerNode: 2 }
      - { categoryName: "c2-8", maxConcurrentTotal: 2, maxConcurrentPerNode: 2 }
      # —— c3-N（并发 3；并发 3 的仿真器认领一个）——
      - { categoryName: "c3-1", maxConcurrentTotal: 3, maxConcurrentPerNode: 3 }
      - { categoryName: "c3-2", maxConcurrentTotal: 3, maxConcurrentPerNode: 3 }
      - { categoryName: "c3-3", maxConcurrentTotal: 3, maxConcurrentPerNode: 3 }
      - { categoryName: "c3-4", maxConcurrentTotal: 3, maxConcurrentPerNode: 3 }
      - { categoryName: "c3-5", maxConcurrentTotal: 3, maxConcurrentPerNode: 3 }
      - { categoryName: "c3-6", maxConcurrentTotal: 3, maxConcurrentPerNode: 3 }
      - { categoryName: "c3-7", maxConcurrentTotal: 3, maxConcurrentPerNode: 3 }
      - { categoryName: "c3-8", maxConcurrentTotal: 3, maxConcurrentPerNode: 3 }

# 组织文件夹（organization folder，D-020）：用自研【分支源插件】扫内源 git →
# 自动发现带 Jenkinsfile 的仓/分支 → 每个自动建子 pipeline job。
#   ▸ 加项目 = 仓里放 Jenkinsfile（插件自动发现，Jenkins 零改动/零重启）；
#   ▸ 流水线（编译 A/B/C + 仿真 A→L、B→E + throttle）写在各仓 Jenkinsfile，模板见 docs/Jenkinsfile.example；
#   ▸ 触发：插件支持 push 即时触发就靠它；否则下方周期扫描兜底。
#
# ⚠ 下面 organizations{} 里的 navigator 是【占位】——换成你那个分支源插件的 job-dsl DSL
#    （plugin id 见 plugins.txt）。若插件没有 job-dsl 扩展，先在 Jenkins UI 建好这个组织文件夹、
#    导出其 config.xml 的 <navigators> 段，用下方 configure{} 注入；或暂以 UI 手建（一次性，非每项目）。
jobs:
  - script: |
      organizationFolder('@@JOB_NAME@@') {
        description('AI Benchmark CI · 扫内源 git 自动发现带 Jenkinsfile 的仓（D-020）')
        organizations {
          // ↓↓↓ 占位：替换为你的分支源插件 navigator（例：xxxSCMNavigator { ... }）
          // 该插件若是类 gitlab 实现，DSL 名/字段以插件文档为准；填仓库组/owner + 凭证 id。
        }
        // configure { it / 'navigators' << '...你的插件 navigator XML...' }   // 无 job-dsl 扩展时用
        triggers { periodicFolderTrigger { interval('1d') } }   // 周期扫描兜底；push 即时触发靠插件
        orphanedItemStrategy { discardOldItems { numToKeep(50) } }
      }
