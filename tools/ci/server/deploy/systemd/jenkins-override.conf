# Jenkins systemd drop-in 模板。deploy.py 渲染 @@占位@@ → /etc/systemd/system/jenkins.service.d/override.conf。
# 覆盖 jenkins .deb 自带的 jenkins.service：设监听端口、加载 JCasC、跳过 setup wizard、注入 admin 密码。
# User=jenkins / JENKINS_HOME=/var/lib/jenkins 等仍沿用 deb 原 unit。密钥经 EnvironmentFile（0600，不入仓 C-1）。
# 启动参数（-D 系统属性，写错只会被忽略不会崩）：
#   runSetupWizard=false           跳过 setup wizard（不向 Update Center 拉建议插件）
#   UpdateCenter.never=true        关掉 Update Center 自动检查——内网连不上公网 UC，调了只超时刷错误日志
#   UsageStatistics.disabled=true  关掉匿名使用统计上报（usage.jenkins.io）——内网无外联
[Service]
EnvironmentFile=@@ENV_FILE@@
Environment=CASC_JENKINS_CONFIG=@@CASC@@
ExecStart=
ExecStart=/usr/bin/java -Djava.awt.headless=true -Djenkins.install.runSetupWizard=false -Dhudson.model.UpdateCenter.never=true -Dhudson.model.UsageStatistics.disabled=true -jar /usr/share/java/jenkins.war --httpPort=@@HTTP_PORT@@
