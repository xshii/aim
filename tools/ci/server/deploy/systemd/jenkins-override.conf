# Jenkins systemd drop-in 模板。deploy.py 渲染 @@占位@@ → /etc/systemd/system/jenkins.service.d/override.conf。
# 覆盖 jenkins .deb 自带的 jenkins.service：设监听端口、加载 JCasC、跳过 setup wizard、注入 admin 密码。
# User=jenkins / JENKINS_HOME=/var/lib/jenkins 等仍沿用 deb 原 unit。密钥经 EnvironmentFile（0600，不入仓 C-1）。
[Service]
EnvironmentFile=@@ENV_FILE@@
Environment=CASC_JENKINS_CONFIG=@@CASC@@
ExecStart=
ExecStart=/usr/bin/java -Djava.awt.headless=true -Djenkins.install.runSetupWizard=false -jar /usr/share/java/jenkins.war --httpPort=@@HTTP_PORT@@
